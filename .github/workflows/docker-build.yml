# =============================================================================
# Build & Push de la imagen Docker a GitHub Container Registry (ghcr.io)
#
# Se dispara:
#   • En cada push a main
#   • Manualmente desde la pestaña "Actions" en GitHub
#
# La imagen queda publicada como:
#   ghcr.io/TU-USUARIO/bk-crm-web:latest
#
# El Synology solo hace `docker pull` — NUNCA build.
# =============================================================================

name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:    # Permite ejecutarlo manualmente desde la web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image owner
        id: lower
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ steps.lower.outputs.owner }}/bk-crm-web:latest
            ghcr.io/${{ steps.lower.outputs.owner }}/bk-crm-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image published
        run: |
          echo "✅  Imagen publicada:"
          echo "    ghcr.io/${{ steps.lower.outputs.owner }}/bk-crm-web:latest"
